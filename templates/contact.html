{% extends "base.html" %}

{% block title %}联系我 - 个人主页{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>联系我</h1>
        <p>有任何问题或合作意向？欢迎联系我！</p>
    </div>
</section>

<section class="contact-section">
    <div class="container">
        <div class="contact-content">
            <div class="contact-info">
                <h2>联系方式</h2>
                <p>期待与您的交流与合作</p>
                
                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="contact-details">
                        <h3>邮箱</h3>
                        <p>lijingdai@example.com</p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="contact-details">
                        <h3>电话</h3>
                        <p>+86 123 4567 8900</p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-university"></i>
                    </div>
                    <div class="contact-details">
                        <h3>学校</h3>
                        <p>上海财经大学</p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <div class="contact-details">
                        <h3>专业</h3>
                        <p>数据科学与大数据技术</p>
                    </div>
                </div>

                <div class="social-media">
                    <h3>社交媒体</h3>
                    <div class="social-links">
                        <a href="https://github.com/dorrris01" target="_blank" class="social-link">
                            <i class="fab fa-github"></i>
                            <span>GitHub</span>
                        </a>
                        <a href="#" target="_blank" class="social-link">
                            <i class="fab fa-twitter"></i>
                            <span>Twitter</span>
                        </a>
                        <a href="#" target="_blank" class="social-link">
                            <i class="fab fa-linkedin"></i>
                            <span>LinkedIn</span>
                        </a>
                        <a href="#" target="_blank" class="social-link">
                            <i class="fab fa-weixin"></i>
                            <span>微信</span>
                        </a>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <h2>发送消息</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" required placeholder="请输入您的姓名">
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" required placeholder="请输入您的邮箱">
                    </div>
                    <div class="form-group">
                        <label for="subject">主题</label>
                        <input type="text" id="subject" name="subject" required placeholder="请输入消息主题">
                    </div>
                    <div class="form-group">
                        <label for="message">消息</label>
                        <textarea id="message" name="message" rows="5" required placeholder="请输入您的消息内容"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">发送消息</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
